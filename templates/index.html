<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Bingo Bot</h1>
        
        <div id="game-container" class="hidden">
            <div id="card" class="card">
                <!-- Bingo card will be generated here -->
            </div>
            
            <div id="controls">
                <button id="call-btn">Call Next Number</button>
                <button id="new-game-btn">New Game</button>
            </div>
            
            <div id="game-info">
                <p>Called Numbers: <span id="called-numbers">None</span></p>
                <p id="status"></p>
            </div>
        </div>
        
        <div id="start-screen">
            <h2>Ready to Play Bingo?</h2>
            <p>Enter your player ID:</p>
            <input type="text" id="player-id" placeholder="Player ID" value="player1">
            <button id="start-btn">Start Game</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
