<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 Bingo Royale</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎰 Bingo Royale</h1>
            <div class="game-info">
                <span id="gameStatus">Create Game</span>
                <span id="playerCount">0 players</span>
            </div>
        </header>

        <div class="game-section">
            <div class="game-code-section" id="gameCodeSection">
                <input type="text" id="gameCode" placeholder="Enter Game ID" maxlength="36">
                <button id="joinBtn">Join Game</button>
                <button id="createBtn">Create Game</button>
            </div>

            <div class="bingo-grid" id="bingoGrid" style="display:none;">
                <div class="grid-header">
                    <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
                </div>
                <div class="grid-cells" id="gridCells"></div>
            </div>

            <div class="controls" id="controls" style="display:none;">
                <button id="newRoundBtn">New Round</button>
                <button id="callBtn">Call Number</button>
                <input type="number" id="callNumber" min="1" max="75" placeholder="1-75">
            </div>

            <div class="called-numbers" id="calledNumbers" style="display:none;">
                <h3>📢 Called Numbers</h3>
                <div id="numbersList"></div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
